{{- if .Values.rbac.enable }}
# permissions for end users to view connections.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: kyma-connection-view
rules:
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - connections
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - connections/status
    verbs:
      - get
{{- end -}}
